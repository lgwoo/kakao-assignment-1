<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="app-title">Todo</h1>

      <!-- 날짜 네비게이션 -->
      <div class="date-nav">
        <button id="prevDayBtn" class="date-nav-btn" aria-label="이전 날짜">&#8249;</button>
        <div class="date-display-wrapper">
          <span id="dateDisplay" class="date-display"></span>
          <!-- 오늘 날짜일 때만 표시되는 TODAY 뱃지 -->
          <span id="todayBadge" class="today-badge hidden">TODAY</span>
        </div>
        <button id="nextDayBtn" class="date-nav-btn" aria-label="다음 날짜">&#8250;</button>
      </div>

      <!-- 입력 영역 -->
      <div class="input-section">
        <div class="input-wrapper">
          <input
            type="text"
            id="todoInput"
            class="todo-input"
            placeholder="할 일을 입력하세요"
            maxlength="200"
          />
          <button id="addBtn" class="add-btn">추가</button>
        </div>
        <!-- 빈 입력 안내 메시지 (기본적으로 숨김) -->
        <p id="errorMsg" class="error-msg hidden">할 일을 입력해주세요.</p>
      </div>

      <!-- 필터 탭 -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">전체</button>
        <button class="filter-tab" data-filter="active">진행 중</button>
        <button class="filter-tab" data-filter="completed">완료</button>
      </div>

      <!-- Todo 목록 영역 -->
      <ul id="todoList" class="todo-list"></ul>

      <!-- 현재 날짜·필터 기준으로 표시할 항목이 없을 때 메시지 -->
      <p id="emptyMsg" class="empty-msg">아직 할 일이 없어요. 추가해보세요!</p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
