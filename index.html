<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="app-title">Todo</h1>

      <!-- 주간 네비게이션 -->
      <div class="week-nav">
        <!-- 헤더: 이전/다음 주 버튼 + 주 범위 레이블 -->
        <div class="week-nav-header">
          <button id="prevWeekBtn" class="week-nav-btn" aria-label="이전 주">&#8249;</button>
          <span id="weekRangeLabel" class="week-range-label"></span>
          <button id="todayBtn" class="today-btn">오늘</button>
          <button id="nextWeekBtn" class="week-nav-btn" aria-label="다음 주">&#8250;</button>
        </div>
        <!-- 날짜 셀 행: 월~일 7개 셀 (JS로 동적 생성) -->
        <div id="weekDayRow" class="week-day-row"></div>
      </div>

      <!-- 입력 영역 -->
      <div class="input-section">
        <div class="input-wrapper">
          <input
            type="text"
            id="todoInput"
            class="todo-input"
            placeholder="할 일을 입력하세요"
            maxlength="200"
          />
          <button id="addBtn" class="add-btn">추가</button>
        </div>
        <!-- 빈 입력 안내 메시지 (기본적으로 숨김) -->
        <p id="errorMsg" class="error-msg hidden">할 일을 입력해주세요.</p>
      </div>

      <!-- 필터 탭 -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">전체</button>
        <button class="filter-tab" data-filter="active">진행 중</button>
        <button class="filter-tab" data-filter="completed">완료</button>
      </div>

      <!-- Todo 목록 영역 -->
      <ul id="todoList" class="todo-list"></ul>

      <!-- 현재 날짜·필터 기준으로 표시할 항목이 없을 때 메시지 -->
      <p id="emptyMsg" class="empty-msg">아직 할 일이 없어요. 추가해보세요!</p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
